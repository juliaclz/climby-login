<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Climby — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen flex items-center justify-center bg-[#07071a] font-inter">

  <div class="login-container w-full min-h-screen flex flex-col md:flex-row">

    <!-- Painel esquerdo — imagem de fundo -->
    <div class="brand-panel relative flex flex-col items-center justify-center p-10 md:p-14 md:w-1/2 min-h-[260px] md:min-h-screen overflow-hidden">
      <div class="brand-overlay"></div>
      <div class="relative z-10 text-center">
        <h1 class="brand-logo text-5xl md:text-6xl font-extrabold tracking-tight mb-4 leading-none">
          <span style="color:#ffffff;">Climb</span><span style="color:#a78bfa;">y</span>
        </h1>
        <p class="brand-tagline text-lg md:text-xl leading-relaxed text-gray-200 font-medium">
          Seu dinheiro.<br />
          Suas escolhas.<br />
          <span style="color:#a3e635;" class="font-bold">Seu futuro.</span>
        </p>
      </div>
    </div>

    <!-- Painel direito — formulário -->
    <div class="form-panel flex items-center justify-center md:w-1/2 px-6 py-12 md:py-0">
      <div class="form-card w-full max-w-md bg-[#0f0f24] border border-[#1e1e40] rounded-2xl p-8 md:p-10 shadow-2xl">

        <div class="text-center mb-8">
          <h2 class="text-2xl md:text-3xl font-bold text-white mb-2">Bem-vindo de volta!</h2>
          <p class="text-gray-400 text-sm md:text-base">Acesse sua conta para continuar</p>
        </div>

        <div class="space-y-5">

          <div>
            <label for="email" class="block text-sm font-semibold text-gray-200 mb-2">E-mail</label>
            <input id="email" type="email" placeholder="seuemail@exemplo.com"
              class="input-field w-full bg-[#13132b] border border-[#2a2a50] rounded-xl px-4 py-3 text-white placeholder-gray-600 text-sm focus:outline-none focus:border-[#7c3aed] focus:ring-1 focus:ring-[#7c3aed] transition-all" />
          </div>

          <div>
            <label for="senha" class="block text-sm font-semibold text-gray-200 mb-2">Senha</label>
            <div class="relative">
              <input id="senha" type="password" placeholder="••••••••••"
                class="input-field w-full bg-[#13132b] border border-[#2a2a50] rounded-xl px-4 py-3 pr-12 text-white placeholder-gray-600 text-sm focus:outline-none focus:border-[#7c3aed] focus:ring-1 focus:ring-[#7c3aed] transition-all" />
              <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div class="text-right mt-2">
              <a href="#" class="text-sm text-[#a78bfa] hover:text-[#c4b5fd] transition-colors">Esqueci minha senha</a>
            </div>
          </div>

          <button type="button" class="btn-primary w-full bg-[#7c3aed] hover:bg-[#6d28d9] text-white font-semibold rounded-xl py-3.5 text-base transition-all duration-200">
            Entrar
          </button>

          <div class="flex items-center gap-4 py-1">
            <div class="flex-1 h-px bg-[#1e1e40]"></div>
            <span class="text-gray-600 text-xs">ou entre com</span>
            <div class="flex-1 h-px bg-[#1e1e40]"></div>
          </div>

          <button type="button" class="btn-secondary w-full flex items-center justify-center gap-3 bg-transparent border border-[#2a2a50] hover:border-[#7c3aed] text-white font-semibold rounded-xl py-3.5 text-base transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.864 4.243A7.5 7.5 0 0119.5 10.5c0 2.92-.556 5.709-1.568 8.268M5.742 6.364A7.465 7.465 0 004.5 10.5a7.464 7.464 0 01-1.15 3.993m1.989 3.559A11.209 11.209 0 008.25 10.5a3.75 3.75 0 117.5 0c0 .527-.021 1.049-.064 1.565M12 10.5a14.94 14.94 0 01-3.6 9.75m6.633-4.596a18.666 18.666 0 01-2.485 5.33" />
            </svg>
            Entrar com biometria
          </button>

          <p class="text-center text-sm text-gray-500 pt-1">
            Ainda não tem uma conta?
            <a href="#" style="color:#a3e635;" class="font-semibold hover:opacity-80 transition-opacity ml-1">Criar conta</a>
          </p>

        </div>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
